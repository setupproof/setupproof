<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">SetupProof</title>
  <desc id="desc">README quickstart verification for maintainers</desc>
  <rect width="1280" height="640" fill="#f7f8f5"/>
  <rect x="72" y="70" width="1136" height="500" fill="#111827"/>
