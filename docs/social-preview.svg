  <text x="432" y="163" fill="#546179" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700">README quickstart verification</text>
  <text x="112" y="286" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="70" font-weight="850">Run the setup steps</text>
