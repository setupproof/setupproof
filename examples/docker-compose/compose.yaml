services:
  app:
    # Pin the manifest list digest so the example cannot drift if the tag moves.
    image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
    working_dir: /workspace
    command:
      - sh
      - -c
      - test -f app.txt && grep -q setup-proof app.txt
    volumes:
      - .:/workspace:ro
